{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass slide-in" style="max-width: 600px;">
        <h2 style="margin-bottom: 2rem;">Edit <span>Profile</span></h2>
        <form method="POST">
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ current_user.location or '' }}"
                    placeholder="e.g. New York, NY">
            </div>
            <div class="form-group">
                <label>Skills (comma separated)</label>
                <input type="text" name="skills" value="{{ current_user.skills or '' }}"
                    placeholder="e.g. Python, Web Design, Cleaning">
            </div>
            <div class="form-group">
                <label>About Me</label>
                <textarea name="bio" rows="5"
                    placeholder="Tell the community about yourself...">{{ current_user.bio or '' }}</textarea>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Save Profile</button>
            <a href="{{ url_for('main.profile', username=current_user.username) }}"
                style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted);">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
