{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass slide-in" style="max-width: 600px;">
        <h2 style="margin-bottom: 2rem;">Post a <span>Task</span></h2>
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" name="title" required placeholder="e.g. Fix a leaky faucet">
            </div>
            <div class="form-group">
                <label>Total Budget ($)</label>
                <input type="number" name="budget" required placeholder="25">
            </div>
            <div class="form-group">
                <label>Task Details</label>
                <textarea name="description" rows="6" required
                    placeholder="Describe what you need help with in detail..."></textarea>
            </div>
            <div class="form-group">
                <label>Attachment (PDF, Image, etc.)</label>
                <input type="file" name="attachment">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Publish Task</button>
        </form>
    </div>
</div>
{% endblock %}
