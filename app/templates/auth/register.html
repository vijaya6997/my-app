{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass slide-in">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Join <span>Mini Freelance</span></h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="e.g. London, UK">
            </div>
            <div class="form-group">
                <label>Primary Skills (e.g. Design, Cleaning)</label>
                <input type="text" name="skills" placeholder="Skills separated by commas">
            </div>
            <div class="form-group">
                <label>I want to:</label>
                <select name="user_type" class="custom-select">
                    <option value="seller">Offer Services (Seller)</option>
                    <option value="buyer">Hire Talent (Buyer)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register Now</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
