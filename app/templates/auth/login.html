{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass slide-in">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome <span>Back</span></h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; cursor: pointer;">
                <input type="checkbox" name="remember" style="width: auto;"> Remember me
            </label>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary);">Register
                here</a>
        </p>
    </div>
</div>
{% endblock %}
